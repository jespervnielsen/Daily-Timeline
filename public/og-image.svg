<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#161b22" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#161b22" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#161b22" stroke-width="1"/>

  <!-- Timeline track -->
  <line x1="160" y1="315" x2="1040" y2="315" stroke="#30363d" stroke-width="3"/>

  <!-- Timeline dots (5 events, coloured by result type) -->
  <circle cx="248" cy="315" r="18" fill="#3fb950"/>
  <circle cx="468" cy="315" r="18" fill="#3fb950"/>
  <circle cx="600" cy="315" r="22" fill="#58a6ff" stroke="#1f6feb" stroke-width="3"/>
  <circle cx="732" cy="315" r="18" fill="#d29922"/>
  <circle cx="952" cy="315" r="18" fill="#3fb950"/>

  <!-- Connecting tick marks -->
  <line x1="248" y1="297" x2="248" y2="278" stroke="#3fb950" stroke-width="2"/>
  <line x1="468" y1="297" x2="468" y2="278" stroke="#3fb950" stroke-width="2"/>
  <line x1="600" y1="293" x2="600" y2="260" stroke="#58a6ff" stroke-width="2"/>
  <line x1="732" y1="297" x2="732" y2="278" stroke="#d29922" stroke-width="2"/>
  <line x1="952" y1="297" x2="952" y2="278" stroke="#3fb950" stroke-width="2"/>

  <!-- Arrow at end of timeline -->
  <polygon points="1052,315 1035,305 1035,325" fill="#30363d"/>

  <!-- Lightning bolt logo (simplified brand mark) -->
  <g transform="translate(520, 100) scale(3.2)">
    <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- Title -->
  <text
    x="600"
    y="480"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#e6edf3"
    text-anchor="middle"
    letter-spacing="-1"
  >Daily Timeline</text>

  <!-- Tagline -->
  <text
    x="600"
    y="548"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
  >Order 5 historical events — a new puzzle every day</text>

  <!-- Decorative accent line under title -->
  <line x1="480" y1="494" x2="720" y2="494" stroke="#863bff" stroke-width="3" stroke-linecap="round"/>
</svg>
