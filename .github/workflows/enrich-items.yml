name: Enrich Items

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run enrich script
        run: npm run enrich

      - name: Commit updated items
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/data/items.json
          git diff --cached --quiet || git commit -m "chore: update image URLs via Wikipedia API"
          git push
